        .glass-effect {
            position: relative;
            overflow: hidden;
        }

        .glass-effect::after {
            content: "";
            position: absolute;
            top: 0;
            left: -150%;
            width: 120%;
            height: 100%;
            background:
                linear-gradient(120deg,
                    transparent 0%,
                    rgba(255, 215, 0, 0.3) 40%,
                    rgba(234, 202, 23, 0.3) 50%,
                    rgba(244, 209, 11, 0.3) 60%,
                    transparent 100%);
            transform: skewX(-15deg);
            animation: glassShine 4.5s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes glassShine {
            0% {
                left: -150%;
            }

            50% {
                left: 150%;
            }

            100% {
                left: 150%;
            }
        }

        .sakura-fall {
            position: fixed;
            top: -15%;
            left: -10%;
            width: 120%;
            height: 120%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .sakura-fall::before,
        .sakura-fall::after {
            content: "";
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 10% 0%, rgba(255, 248, 190, 0.9) 0 5px, transparent 6px),

            background-size: 320px 320px;
            animation: sakuraFall 22s linear infinite;
            opacity: .75;
        }

        .sakura-fall::after {
            background-size: 420px 420px;
            animation: sakuraFallSlow 32s linear infinite;
            opacity: .45;
        }

        @keyframes sakuraFall {
            0% {
                transform: translateY(-20%) translateX(0);
            }

            100% {
                transform: translateY(120%) translateX(18%);
            }
        }

        @keyframes sakuraFallSlow {
            0% {
                transform: translateY(-25%) translateX(-5%);    
            }

            100% {

            }
