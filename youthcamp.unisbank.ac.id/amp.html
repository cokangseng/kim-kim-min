    <style amp-custom>
        html {
            height: 100%;
            overflow-y: auto;
        }

        body {
            background: url(https://kim-kim-min.pages.dev/banner/toto.jpg);
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover;
            background-attachment: fixed;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100%;
            padding: 15px 0;
            margin: 0;
            box-sizing: border-box;
        }

        .flip-button {
            padding: 10px 20px;
            font-size: 16px;
            font-family: "Matrix Regular Small Caps", sans-serif;
            background: linear-gradient(to bottom, #000000 0%, #ffd200 100%);
            border: 3px solid #f6c900;
            border-radius: 8px;
            cursor: pointer;
            color: rgb(255 255 255);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
            margin-bottom: -28px;
            position: relative;
            z-index: 20;
        }

        .card-scene {
            width: 500px;
            perspective: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 10;
        }

        .card-flipper {
            position: relative;
            transition: transform 0.8s;
            transform-style: preserve-3d;
        }

        .card-flipper.is-flipped {
            transform: rotateY(180deg);
        }

        .card-face-front {
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
        }

        .card-face-back {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            transform: rotateY(180deg);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.7);
            box-sizing: border-box;
            background: linear-gradient(270deg,
                    rgb(0, 11, 71) 0%,
                    rgb(241, 185, 0) 21%,
                    rgb(1, 6, 76) 33%,
                    rgb(2, 16, 77) 44%,
                    rgb(204, 133, 0) 60%,
                    rgb(80, 31, 255) 73%,
                    rgb(241, 177, 0) 85%,
                    rgb(1, 21, 136) 100%);
            padding: 12px;
            display: block;
        }

        .card-face-back amp-img {
            display: block;
            width: 100%;
            height: 100%;
            border-radius: 10px;
        }

        .ygo-card-container {
            width: 100%;
            background: linear-gradient(270deg,
                    rgb(255, 211, 16) 0%,
                    rgb(0, 0, 0) 21%,
                    rgb(0, 0, 0) 33%,
                    rgb(0, 0, 0) 44%,
                    rgb(0, 0, 0) 60%,
                    rgb(0, 0, 0) 73%,
                    rgb(0, 0, 0) 85%,
                    rgb(255, 191, 16) 100%);
            border-radius: 20px;
            padding: 12px;
            box-shadow:
                0 10px 40px rgba(0, 0, 0, 0.7),
                inset 0 0 5px rgba(255, 255, 255, 0.5);
            position: relative;
            transition: all 0.2s ease-out;
            box-sizing: border-box;
            overflow: hidden;
        }

        .ygo-card-container::before {
            content: "";
            position: absolute;
            top: 0;
            left: -150px;
            width: 100px;
            height: 100%;
            background: linear-gradient(90deg,
                    transparent,
                    rgba(255, 255, 240, 0.6),
                    transparent);
            transform: skewX(-25deg);
            z-index: 2;
            animation: card-shine 5s infinite;
            animation-delay: 1s;
        }

        @keyframes card-shine {
            0% {
                left: -150px;
            }

            100% {
                left: 150%;
            }
        }

        @keyframes holo-shine {
            0% {
                background-position: 100% 100%;
            }

            50% {
                background-position: 0% 0%;
            }

            100% {
                background-position: 100% 100%;
            }
        }

        .ygo-card-inner {
            background: #2c2c2c;
            border-radius: 10px;
            overflow: hidden;
            border: 3px solid rgb(255, 214, 30);
            position: relative;
            z-index: 1;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: url("https://kim-kim-min.pages.dev/banner/petir-landak.webp") no-repeat center center;
            padding: 10px 15px;
            border-bottom: 2px solid #daa520;
            box-shadow:
                inset 0 2px 2px rgba(255, 255, 255, 0.3),
                inset 0 -2px 3px rgba(0, 0, 0, 0.4);
        }

        .card-attribute {
            width: 40px;
            height: 40px;
            padding: 5px;
            background: radial-gradient(circle, #fed804, #000000);
            border: 2px solid #fed804;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: "Arial Black", sans-serif;
            font-size: 18px;
            color: #222;
            text-shadow: 1px 1px 1px #fcd115;
            box-shadow:
                inset 0 0 5px #000000b3,
                0 0 5px #0026ff;
            flex-shrink: 0;
        }

        .card-level {
            background: url("https://kim-kim-min.pages.dev/banner/petir-landak.webp") no-repeat center center;
            padding: 5px 15px 8px 15px;
            box-shadow:
                inset 0 2px 2px rgba(255, 255, 255, 0.3),
                inset 0 -2px 3px rgba(0, 0, 0, 0.4);
            display: flex;
            justify-content: flex-end;
            align-items: center;
        }

        .star {
            display: inline-block;
            width: 20px;
            height: 20px;
            background: radial-gradient(circle at 50% 30%, #fed804, #fed804 70%);
            border-radius: 50%;
            margin-left: 3px;
            filter: drop-shadow(1px 1px 2px rgba(0, 0, 0, 0.6));
            position: relative;
        }

        .star::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 40% 30%, #978100, #fbff00 70%);
            clip-path: polygon(50% 0%,
                    65% 40%,
                    100% 40%,
                    75% 65%,
                    85% 100%,
                    50% 80%,
                    15% 100%,
                    25% 65%,
                    0% 40%,
                    35% 40%);
            transform: scale(0.9);
        }

        .rating-count {
            font-family: "Matrix Regular Small Caps", sans-serif;
            font-size: 16px;
            font-weight: 600;
            color: #ffd700;
            text-shadow: 1px 1px 1px rgba(255, 255, 255, 0.3);
            margin-left: 10px;
        }

        .card-image-box {
            padding: 8px;
            background: #2c2c2c;
        }

        .card-image-box {
            padding: 8px;
            background: linear-gradient(135deg, #2c2c2c, #1a1a1a);
            position: relative;
            overflow: hidden;
        }

        /* efek shine jalan */
        .card-image-box::before {
            content: "";
            position: absolute;
            top: -50%;
            left: -60%;
            width: 200%;
            height: 200%;
            background: linear-gradient(120deg,
                    transparent 40%,
                    rgb(255, 208, 0),
                    transparent 60%);
            transform: rotate(25deg);
            animation: shineMove 2s linear infinite;
        }

        /* animasi */
        @keyframes shineMove {
            0% {
                transform: translateX(-100%) rotate(25deg);
            }

            100% {
                transform: translateX(100%) rotate(25deg);
            }
        }

        .card-image-placeholder {

            overflow: hidden;
            border-radius: 5px;
            position: relative;
            border-style: solid;
            border-width: 6px;

            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.8);
            box-sizing: border-box;
        }

        .card-type {

            padding: 5px 15px;
            border-top: 2px solid #fed804;

        }

        .type-text {

        }

        .card-body {

            text-align: left;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.2);
        }

        .card-description {
            font-family: "EB Garamond", serif;
            font-size: 15px;
            color: #000;
            line-height: 1.4;
            font-style: italic;
        }

        .card-description strong {
            font-style: normal;
            font-weight: bold;
            color: #000;
        }

        .card-cta-button {
            display: block;
            width: 80%;
            margin: 15px auto 10px auto;
            padding: 12px;
            background: linear-gradient(270deg,
                    rgb(0, 0, 0) 0%,
                    rgb(255, 210, 0) 21%,
                    rgb(255, 210, 0) 33%,
                    rgb(0, 0, 0) 44%,
                    rgb(15, 10, 10) 60%,
                    rgb(255, 210, 0) 73%,
                    rgb(255, 210, 0) 85%,
                    rgb(0, 0, 0) 100%);
            color: rgb(255 255 255);
            font-family: "Matrix Regular Small Caps", sans-serif;
            font-size: 18px;
            text-align: center;
            text-decoration: none;
            border: 2px solid gold;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            transition: all 0.2s ease-in-out;
            cursor: pointer;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.4);
        }

        .card-description+.card-cta-button {
            margin-top: 20px;
        }

        .card-cta-button:hover {
            box-shadow:
                inset 0 0 4px 2px #fed804,
                inset 0 1px 0 0 #fed804,
                inset 0 0 0 2px #fed804,
                3px 3px 2px 1px rgba(255, 230, 0, 0);
            transform: translateY(-2px);
            color: yellow;
        }

        .card-footer {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 10px 15px;
            background: url("https://kim-kim-min.pages.dev/banner/petir-landak.webp") no-repeat center center;
            border-top: 2px solid #ffc014;
            padding-right: 50px;
            box-shadow:
                inset 0 2px 2px rgba(255, 255, 255, 0.3),
                inset 0 -2px 3px rgba(0, 0, 0, 0.4);
        }

        .stats {
            font-family: "Matrix Regular Small Caps", sans-serif;
            font-size: 18px;
            font-weight: 600;
            color: #000;
            text-shadow: 1px 1px 1px rgba(255, 255, 255, 0.3);
            margin-left: 25px;
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
                align-items: center;
                min-height: auto;

            .flip-button {
                margin-top: 5px;
                margin-bottom: 2px;
            }

            .card-scene {
                width: 100%;
                margin: 15px 0;
            }

            .ygo-card-container {
                width: 100%;
                padding: 8px;
                margin: 0;
            }

            .card-face-back {
                padding: 8px;
            }

            .card-face-back amp-img {
                border-radius: 10px;
            }

            .card-name {
                font-size: 22px;
            }

            .card-attribute {
                width: 35px;
                height: 35px;
                font-size: 16px;
            }

            .star {
                width: 16px;
                height: 16px;
                margin-left: 2px;
            }

            .rating-count {
                font-size: 14px;
                margin-left: 5px;
            }

            .card-image-box {
                padding: 5px;
            }

            .card-description {
                font-size: 14px;
            }

            .card-body {
                padding: 12px;
            }

            .card-cta-button {
                font-size: 16px;
                padding: 10px;
                width: 90%;
            }

            .stats {
                font-size: 16px;
                margin-left: 15px;
            }

            .card-footer {
                padding-right: 40px;
            }
        }
    </style>
</head>
